---
# ============================================================
# Ansible Playbook — Configure Bastion Host for GKE Access
# ============================================================
# This playbook configures the bastion (jump) host that allows
# secure access to the private GKE cluster API endpoint.
#
# Usage:
#   ansible-playbook -i ansible/inventory.yml ansible/configure-bastion.yml
# ============================================================

- name: Configure Bastion Host for GKE Access
  hosts: bastion
  become: true
  vars:
    gcp_project: "cloudappproject-494314"
    gke_cluster: "dev-employee-gke"
    gke_region: "europe-west1"
    helm_version: "v3.16.0"
    kubectl_version: "v1.31.0"

  tasks:
    # ── System Updates ──────────────────────────────────────
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - git
          - unzip
          - jq
          - wget
        state: present

    # ── Install kubectl ─────────────────────────────────────
    - name: Download kubectl
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0750'

    - name: Verify kubectl installation
      ansible.builtin.command: kubectl version --client
      register: kubectl_version_output
      changed_when: false

    - name: Print kubectl version
      ansible.builtin.debug:
        var: kubectl_version_output.stdout

    # ── Install Helm ─────────────────────────────────────────
    - name: Download Helm install script
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get_helm.sh
        mode: '0700'

    - name: Install Helm
      ansible.builtin.command: /tmp/get_helm.sh
      args:
        creates: /usr/local/bin/helm

    - name: Verify Helm installation
      ansible.builtin.command: helm version
      register: helm_version_output
      changed_when: false

    - name: Print Helm version
      ansible.builtin.debug:
        var: helm_version_output.stdout

    # ── Install Google Cloud SDK ─────────────────────────────
    - name: Add Google Cloud SDK apt key
      ansible.builtin.apt_key:
        url: https://packages.cloud.google.com/apt/doc/apt-key.gpg
        state: present

    - name: Add Google Cloud SDK apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main"
        state: present
        filename: google-cloud-sdk

    - name: Install Google Cloud SDK
      ansible.builtin.apt:
        name:
          - google-cloud-sdk
          - google-cloud-sdk-gke-gcloud-auth-plugin
        state: present
        update_cache: true

    # ── Configure GKE Access ─────────────────────────────────
    - name: Configure gcloud project
      ansible.builtin.command: >
        gcloud config set project {{ gcp_project }}
      become: false
      changed_when: false

    - name: Get GKE credentials
      ansible.builtin.command: >
        gcloud container clusters get-credentials {{ gke_cluster }}
        --region={{ gke_region }}
        --project={{ gcp_project }}
      become: false
      changed_when: false

    - name: Verify kubectl can connect to cluster
      ansible.builtin.command: kubectl get nodes
      become: false
      register: nodes_output
      changed_when: false

    - name: Print cluster nodes
      ansible.builtin.debug:
        var: nodes_output.stdout

    # ── Add Helm Repositories ─────────────────────────────────
    - name: Add jetstack (cert-manager) Helm repo
      ansible.builtin.command: helm repo add jetstack https://charts.jetstack.io
      become: false
      changed_when: false

    - name: Add ingress-nginx Helm repo
      ansible.builtin.command: helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
      become: false
      changed_when: false

    - name: Add prometheus-community Helm repo
      ansible.builtin.command: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
      become: false
      changed_when: false

    - name: Update all Helm repos
      ansible.builtin.command: helm repo update
      become: false
      changed_when: false

    # ── Harden SSH ───────────────────────────────────────────
    - name: Disable password authentication for SSH
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"
        state: present
      notify: Restart SSH

    - name: Disable root SSH login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin no"
        state: present
      notify: Restart SSH

  handlers:
    - name: Restart SSH
      ansible.builtin.service:
        name: sshd
        state: restarted
