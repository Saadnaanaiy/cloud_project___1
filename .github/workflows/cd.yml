name: CD — Deploy to GKE

on:
  workflow_run:
    workflows: ["CI — Build & Push Docker Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (default: latest)'
        required: false
        default: 'latest'

env:
  PROJECT_ID: cloudappproject-494314
  REGION: europe-west1
  GKE_CLUSTER: dev-cloud-native-employee-gke
  REGISTRY: europe-west1-docker.pkg.dev
  REPO: dev-employee-platform
  NAMESPACE: employee-platform

jobs:
  deploy:
    name: 🚀 Deploy to GKE
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}

      - name: Download image tag
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v7
        with:
          name: image-tag
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Set image tag
        id: tag
        run: |
          if [ -f image-tag.txt ]; then
            echo "TAG=$(cat image-tag.txt)" >> $GITHUB_OUTPUT
          else
            echo "TAG=${{ github.event.inputs.image_tag || 'latest' }}" >> $GITHUB_OUTPUT
          fi

      # ─────────────────────────────────────────────
      # STEP 1 — Apply infrastructure manifests
      # ─────────────────────────────────────────────
      - name: Apply namespace & static config
        run: |
          kubectl apply -f k8s/00-namespace.yaml
          kubectl apply -f k8s/01-secrets.yaml
          kubectl apply -f k8s/02-configmap.yaml
          kubectl apply -f k8s/03-mysql.yaml
          kubectl apply -f k8s/07-cert-manager-issuer.yaml
          kubectl apply -f k8s/09-pdb.yaml
          kubectl apply -f k8s/10-networkpolicy.yaml
          kubectl apply -f k8s/11-alerts.yaml
          kubectl apply -f k8s/12-mysql-backup.yaml
          kubectl apply -f k8s/13-grafana-dashboard.yaml
          kubectl apply -f k8s/08-monitoring-ingress.yaml
          kubectl apply -f k8s/14-resource-quota.yaml

      - name: Wait for MySQL
        run: |
          kubectl rollout status statefulset/mysql \
            -n ${{ env.NAMESPACE }} --timeout=180s || true

      # ─────────────────────────────────────────────
      # STEP 2 — GitOps: Update image tags + push to Git
      # ─────────────────────────────────────────────
      - name: Update image tags in manifests
        run: |
          TAG="${{ steps.tag.outputs.TAG }}"
          sed -i "s|image: .*/backend:.*|image: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/backend:$TAG|" k8s/04-backend.yaml
          sed -i "s|image: .*/frontend:.*|image: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/frontend:$TAG|" k8s/05-frontend.yaml
          echo "✅ Image tags updated to $TAG"

      - name: Commit updated manifests to Git
        run: |
          git config user.name "CI Bot"
          git config user.email "ci@empmanager.io"
          git add k8s/04-backend.yaml k8s/05-frontend.yaml
          git diff --cached --quiet || git commit -m "Update image tags to ${{ steps.tag.outputs.TAG }} [skip ci]"
          git pull --rebase origin main && git push origin main

      # ─────────────────────────────────────────────
      # STEP 3 — Apply services + Ingress
      # ─────────────────────────────────────────────
      - name: Apply services
        run: |
          kubectl apply -f k8s/04-backend.yaml
          kubectl apply -f k8s/05-frontend.yaml
          kubectl apply -f k8s/06-ingress.yaml

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/backend \
            -n ${{ env.NAMESPACE }} --timeout=120s || echo "⚠️ Backend rollout timeout — check ArgoCD"
          kubectl rollout status deployment/frontend \
            -n ${{ env.NAMESPACE }} --timeout=120s || echo "⚠️ Frontend rollout timeout — check ArgoCD"

      - name: Show deployed pods
        run: kubectl get pods -n ${{ env.NAMESPACE }}

      - name: Deployment summary
        run: |
          echo "✅ Deployment complete!"
          echo "🌐 App URL: https://empmanager.duckdns.org"
          echo "📦 Image tag: ${{ steps.tag.outputs.TAG }}"
