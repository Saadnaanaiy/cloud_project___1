name: CD — Deploy to GKE
# Trigger fresh build with updated Turnstile keys (v3 - new widget)

on:
  workflow_run:
    workflows: ["CI — Build & Push Docker Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (default: latest)'
        required: false
        default: 'latest'

env:
  PROJECT_ID: cloudappproject-494314
  REGION: europe-west1
  GKE_CLUSTER: dev-cloud-native-employee-gke
  REGISTRY: europe-west1-docker.pkg.dev
  REPO: dev-employee-platform
  NAMESPACE: employee-platform

jobs:
  deploy:
    name: 🚀 Deploy to GKE
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}

      - name: Download image tag
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v7
        with:
          name: image-tag
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Set image tag
        id: tag
        run: |
          if [ -f image-tag.txt ]; then
            echo "TAG=$(cat image-tag.txt)" >> $GITHUB_OUTPUT
          else
            echo "TAG=${{ github.event.inputs.image_tag || 'latest' }}" >> $GITHUB_OUTPUT
          fi

      # ─────────────────────────────────────────────
      # STEP 1 — Apply core infrastructure manifests
      # ─────────────────────────────────────────────
      - name: Apply namespace & config
        run: |
          kubectl apply -f k8s/00-namespace.yaml
          # Inject ALL Secrets from GitHub Secrets with fallback to placeholders
          MYSQL_ROOT_PASSWORD="${{ secrets.MYSQL_ROOT_PASSWORD }}"
          DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
          JWT_SECRET="${{ secrets.JWT_SECRET }}"
          TURNSTILE_KEY="${{ secrets.TURNSTILE_SECRET_KEY }}"
          ADMIN_PASS="${{ secrets.DEFAULT_ADMIN_PASSWORD }}"
          HR_PASS="${{ secrets.DEFAULT_HR_PASSWORD }}"
          MANAGER_PASS="${{ secrets.DEFAULT_MANAGER_PASSWORD }}"
          GCS_BUCKET="${{ secrets.GCS_BACKUP_BUCKET }}"

          sed -i "s|changeme-root|${MYSQL_ROOT_PASSWORD:-changeme-root}|g" k8s/01-secrets.yaml
          sed -i "s|changeme-db|${DB_PASSWORD:-changeme-db}|g" k8s/01-secrets.yaml
          sed -i "s|changeme-jwt-secret-minimum-32-chars!!|${JWT_SECRET:-changeme-jwt-secret-minimum-32-chars!!}|g" k8s/01-secrets.yaml
          sed -i "s|TURNSTILE_SECRET_KEY_PLACEHOLDER|${TURNSTILE_KEY:-TURNSTILE_SECRET_KEY_PLACEHOLDER}|g" k8s/01-secrets.yaml
          sed -i "s|admin-password-placeholder|${ADMIN_PASS:-admin-password-placeholder}|g" k8s/01-secrets.yaml
          sed -i "s|hr-password-placeholder|${HR_PASS:-hr-password-placeholder}|g" k8s/01-secrets.yaml
          sed -i "s|manager-password-placeholder|${MANAGER_PASS:-manager-password-placeholder}|g" k8s/01-secrets.yaml
          sed -i "s|changeme-backup-bucket|${GCS_BUCKET:-changeme-backup-bucket}|g" k8s/01-secrets.yaml
          kubectl apply -f k8s/01-secrets.yaml
          kubectl apply -f k8s/02-configmap.yaml
          kubectl apply -f k8s/01-secrets.yaml
          kubectl apply -f k8s/02-configmap.yaml

      - name: Deploy MySQL (StatefulSet)
        run: kubectl apply -f k8s/03-mysql.yaml

      - name: Wait for MySQL to be ready
        run: |
          kubectl rollout status statefulset/mysql \
            -n ${{ env.NAMESPACE }} --timeout=180s

      # ─────────────────────────────────────────────
      # STEP 2 — Update image tags & deploy services
      # ─────────────────────────────────────────────
      - name: Update manifests and deploy
        run: |
          TAG="${{ steps.tag.outputs.TAG }}"
          IMAGE_BASE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}"
          
          # Inject image tags into manifests
          sed -i "s|backend:v1.0.0|backend:$TAG|g" k8s/04-backend.yaml
          sed -i "s|frontend:v1.0.0|frontend:$TAG|g" k8s/05-frontend.yaml
          
          # Apply full manifests (includes env vars and other config)
          kubectl apply -f k8s/04-backend.yaml
          kubectl apply -f k8s/05-frontend.yaml
          kubectl apply -f k8s/09-pdb.yaml
          
          # Force restart to ensure fresh containers
          kubectl rollout restart deployment/backend -n ${{ env.NAMESPACE }}
          kubectl rollout restart deployment/frontend -n ${{ env.NAMESPACE }}

      # ─────────────────────────────────────────────
      # STEP 3 — Apply SSL cert-manager + Ingress
      # ─────────────────────────────────────────────
      - name: Apply security & monitoring manifests
        run: |
          kubectl apply -f k8s/10-networkpolicy.yaml
          kubectl apply -f k8s/11-alerts.yaml
          kubectl apply -f k8s/12-mysql-backup.yaml
          kubectl apply -f k8s/13-grafana-dashboard.yaml
          kubectl apply -f k8s/08-monitoring-ingress.yaml

      - name: Apply cert-manager ClusterIssuers
        run: kubectl apply -f k8s/07-cert-manager-issuer.yaml

      - name: Apply Ingress with TLS
        run: kubectl apply -f k8s/06-ingress.yaml

      # ─────────────────────────────────────────────
      # STEP 4 — Verify deployment
      # ─────────────────────────────────────────────
      - name: Wait for backend rollout
        run: |
          kubectl rollout status deployment/backend \
            -n ${{ env.NAMESPACE }} --timeout=180s

      - name: Wait for frontend rollout
        run: |
          kubectl rollout status deployment/frontend \
            -n ${{ env.NAMESPACE }} --timeout=120s

      - name: Show deployed pods
        run: kubectl get pods -n ${{ env.NAMESPACE }}

      - name: Show Ingress & SSL certificate status
        run: |
          echo "=== Ingress ==="
          kubectl get ingress -n ${{ env.NAMESPACE }}
          echo "=== TLS Certificates ==="
          kubectl get certificate -n ${{ env.NAMESPACE }} || true

      - name: Deployment summary
        run: |
          echo "✅ Deployment complete!"
          echo "🌐 App URL: https://empmanager.duckdns.org"
          echo "📦 Image tag: ${{ steps.tag.outputs.TAG }}"
