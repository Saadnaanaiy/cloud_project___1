# ─────────────────────────────────────────────────────────────────────────────
# sonar-project.properties
# Place this at the ROOT of your repository (same level as /backend /frontend /k8s)
# ─────────────────────────────────────────────────────────────────────────────

sonar.projectKey=Saadnaanaiy_cloud_project___1
sonar.organization=saadnaanaiy

sonar.projectName=dev-employee-platform
sonar.projectVersion=1.0

# ── Sources ───────────────────────────────────────────────────────────────────
sonar.sources=backend/src,frontend/src
sonar.tests=backend/src,frontend/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# ── Coverage ──────────────────────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

# ── TypeScript ────────────────────────────────────────────────────────────────
sonar.typescript.tsconfigPath=backend/tsconfig.json

# ── Exclusions ────────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/*.min.js,\
  **/*.d.ts,\
  **/k8s/**
