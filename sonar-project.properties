sonar.projectKey=Saadnaanaiy_cloud_project___1
sonar.organization=saadnaanaiy

sonar.projectName=dev-employee-platform
sonar.projectVersion=1.0

# ── Sources ───────────────────────────────────────────────────────────────────
sonar.sources=backend/src,frontend/src

# ── Test files (separate from sources to avoid the 59-file conflict) ──────────
# Only include spec/test files here — currently there are none, so tests= is omitted
# sonar.tests=backend/src,frontend/src
# sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# ── Coverage ──────────────────────────────────────────────────────────────────
# Backend coverage (Jest with --passWithNoTests).
# Frontend has no test runner yet — excluded from coverage requirement.
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info
sonar.coverage.exclusions=frontend/src/**,**/*.spec.ts,**/*.test.ts

# ── TypeScript ────────────────────────────────────────────────────────────────
sonar.typescript.tsconfigPath=backend/tsconfig.json

# ── Exclusions ────────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/*.min.js,\
  **/*.d.ts,\
  **/k8s/**
