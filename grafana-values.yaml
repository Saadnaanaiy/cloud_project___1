grafana:
  adminPassword: "Admin123!"
  grafana.ini:
    server:
      domain: empmanager.duckdns.org
      root_url: "https://%(domain)s/grafana/"
      serve_from_sub_path: true
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki:3100
      isDefault: false
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
      label: grafana_dashboard
    datasources:
      enabled: true
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
prometheus:
  prometheusSpec:
    retention: 15d
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['namespace', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'default-receiver'
    receivers:
      - name: 'default-receiver'
        email_configs:
          - to: 'admin@empmanager.io'
            from: 'alertmanager@empmanager.io'
            smarthost: 'smtp.gmail.com:587'
            auth_username: 'alertmanager@empmanager.io'
            auth_identity: 'alertmanager@empmanager.io'
            auth_password: 'changeme-alertmanager-password'
            send_resolved: true
            headers:
              subject: '⚠️ [AlertManager] {{ .GroupLabels.severity | toUpper }} - {{ .GroupLabels.namespace }}'
    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['namespace', 'alertname']
