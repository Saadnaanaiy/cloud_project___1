apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: employee-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Saadnaanaiy/cloud_project___1.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: employee-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
