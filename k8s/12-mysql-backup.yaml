apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-backup-pvc
  namespace: employee-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-backup-script
  namespace: employee-platform
data:
  backup.sh: |
    #!/bin/sh
    set -e

    BACKUP_DIR="/backups"
    TIMESTAMP=$(date +%Y%m%d_%H%M%S)
    BACKUP_FILE="${BACKUP_DIR}/mysql_backup_${TIMESTAMP}.sql.gz"

    echo "Starting MySQL backup at $(date)"

    mysqldump \
      -h mysql-service \
      -u root \
      -p"${MYSQL_ROOT_PASSWORD}" \
      --databases "${MYSQL_DATABASE}" \
      --single-transaction \
      --quick \
      --routines \
      --triggers \
      | gzip > "${BACKUP_FILE}"

    echo "Backup completed: ${BACKUP_FILE}"
    echo "Size: $(du -h "${BACKUP_FILE}" | cut -f1)"

    # Keep only last 7 backups
    ls -t ${BACKUP_DIR}/mysql_backup_*.sql.gz | tail -n +8 | xargs -r rm
    echo "Old backups cleaned. Remaining: $(ls ${BACKUP_DIR}/mysql_backup_*.sql.gz | wc -l)"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mysql-backup
  namespace: employee-platform
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      template:
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          containers:
            - name: mysql-backup
              image: mysql:8.0
              command:
                - /bin/sh
                - /scripts/backup.sh
              env:
                - name: MYSQL_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mysql-secret
                      key: MYSQL_ROOT_PASSWORD
                - name: MYSQL_DATABASE
                  valueFrom:
                    secretKeyRef:
                      name: mysql-secret
                      key: MYSQL_DATABASE
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
                - name: backup-script
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: mysql-backup-pvc
            - name: backup-script
              configMap:
                name: mysql-backup-script
                defaultMode: 0755
