apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: employee-ingress
  namespace: employee-platform
  annotations:
    # Use NGINX Ingress Controller (installed via Helm)
    kubernetes.io/ingress.class: "nginx"
    # cert-manager will automatically provision a Let's Encrypt certificate
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Redirect all HTTP traffic to HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Increase proxy timeouts for WebSocket (Socket.IO)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Enable WebSocket upgrade headers
    nginx.ingress.kubernetes.io/proxy-set-headers: "employee-platform/websocket-headers"
    # Body size for file uploads
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  # TLS block — cert-manager auto-creates the Secret "employee-tls"
  tls:
    - hosts:
        - empmanager.duckdns.org
      secretName: employee-tls
  rules:
    - host: empmanager.duckdns.org
      http:
        paths:
          # Backend API routes
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3001
          # WebSocket route for real-time chat
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3001
          # Frontend (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
