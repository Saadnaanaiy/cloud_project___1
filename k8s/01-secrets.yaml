apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: employee-platform
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "changeme-root"
  MYSQL_DATABASE: "employee_db"
  DB_USERNAME: "employee_user"
  DB_PASSWORD: "changeme-db"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: employee-platform
type: Opaque
stringData:
  JWT_SECRET: "changeme-jwt-secret-minimum-32-chars!!"
  JWT_EXPIRES_IN: "7d"
  TURNSTILE_SECRET_KEY: "TURNSTILE_SECRET_KEY_PLACEHOLDER"
  DEFAULT_ADMIN_PASSWORD: "admin-password-placeholder"
  DEFAULT_HR_PASSWORD: "hr-password-placeholder"
  DEFAULT_MANAGER_PASSWORD: "manager-password-placeholder"
