apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backend-secret
  namespace: employee-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: backend-secret
    creationPolicy: Merge
    deletionPolicy: Retain
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: JWT_SECRET
    - secretKey: TURNSTILE_SECRET_KEY
      remoteRef:
        key: TURNSTILE_SECRET_KEY

